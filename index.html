<!DOCTYPE html>
<html>
    <head>
        <title>Kangawooo Events</title>
        <meta charset="utf-8" name="viewport" content="width=device-width" initial-scale="1.0">
        <link rel="stylesheet" href="src/css/style.css">
        <script type="text/javascript" src="src/js/ArtworkViewer.js"></script>
    </head>
    <body>
        <header>
            <h1>Kangawooo Events</h1>
            <h2>Community Gallery</h2>
        </header>

        <div id="artwork-div">
            <div id="artwork-viewer">
                <img id="artwork" src="assets/images/artwork/crycatt1.png">
                <h2>"Cammie and Cryatt"</h2>
                <p>Artwork by cammiescorner</p>
            </div>
        </div>

        <a id="left-arrow">
            <img 
                class="arrow"
                src="assets/images/arrows/arrow-left.png"
            >
        </a>

        <a id="right-arrow">
            <img 
                class="arrow"
                src="assets/images/arrows/arrow-right.png"
            >
        </a>

        <footer>
            <div id="socials">
                <a href="https://discord.gg/NMJkNVUUWZ" target="_blank">
                <img
                    class="social"
                    src="assets/images/socials/discord-fill.png"
                >
                </a>
                <a href="https://www.youtube.com/@Kangawooo" target="_blank">
                    <img 
                        class="social"
                        src="assets/images/socials/youtube-fill.png"
                    >
                </a>
                <a href="https://www.instagram.com/kanga_wooo/" target="_blank">
                    <img 
                        class="social"
                        src="assets/images/socials/instagram-fill.png"
                    >
                </a>
                <a href="https://www.twitch.tv/kangatwooo" target="_blank">
                    <img 
                        class="social"
                        src="assets/images/socials/twitch-fill.png"
                    >
                </a>
                <a href="https://www.tiktok.com/@kanga_wooo" target="_blank">
                    <img 
                        class="social"
                        src="assets/images/socials/tiktok-fill.png"
                    >
                </a>
            </div>
        </footer>
    </body>
</html>
